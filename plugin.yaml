name: gbrain
version: 1.2.0
description: "GBrain — persistent knowledge brain with brain-agent-loop (auto-detect entities, read brain before responding, write timeline after turns). Supports OAuth client_credentials auth."
requires_env:
  - MCP_GBRAIN_API_KEY
optional_env:
  - MCP_GBRAIN_URL
  - MCP_GBRAIN_TIMEOUT
  - MCP_GBRAIN_OAUTH_CLIENT_ID
  - MCP_GBRAIN_OAUTH_CLIENT_SECRET
hooks: []
